workflows:
  ios-workflow:
    name: DualCam iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project DualCamApp.xcodeproj \
            -scheme DualCamApp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -derivedDataPath build/
          
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/DualCamApp.app Payload/
          zip -r DualCam.ipa Payload/
          rm -rf Payload/
    artifacts:
      - "DualCam.ipa"
    publishing:
      email:
        recipients:
          - your@email.com

workflows:
  ios-workflow:
    name: DualCam iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Build IPA
        script: |
          xcodebuild clean build \
            -project DualCamApp.xcodeproj \
            -scheme DualCamApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/DualCamApp.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO
          
          xcodebuild -exportArchive \
            -archivePath build/DualCamApp.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist ExportOptions.plist
    artifacts:
      - "build/output/*.ipa"

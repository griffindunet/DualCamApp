workflows:
  ios-workflow:
    name: DualCam iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Archive
        script: |
          xcodebuild clean archive \
            -project DualCamApp.xcodeproj \
            -scheme DualCamApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/DualCamApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Export IPA
        script: |
          APP_PATH=$(find $CM_BUILD_DIR/DualCamApp.xcarchive/Products -name "*.app" | head -1)
          echo "App trouvée : $APP_PATH"

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/DualCamApp.app

          mkdir -p $CM_BUILD_DIR/ipa
          cd /tmp
          zip -r $CM_BUILD_DIR/ipa/DualCam.ipa Payload/
          rm -rf /tmp/Payload

          echo "IPA size: $(du -sh $CM_BUILD_DIR/ipa/DualCam.ipa)"

    artifacts:
      - $CM_BUILD_DIR/ipa/DualCam.ipa
